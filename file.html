<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Texto e Estilo de fontes</title>

    <style>
        h1{
            color: green;
            text-decoration: overline;
            text-decoration-color: red;
            text-decoration-thickness: 5px;
            font-family:cursive;
            font-style:italic;
            font-weight: 2;
        }
         h2{
        
            text-decoration: underline;
            font-family:monospace;
            font-style:italic;
            font-weight: 100;
            text-shadow: firebrick 1px 0 10px;
        }
         h3{

            text-decoration: line-through;
            text-transform: capitalize;
        }
         h4{
            text-decoration: overline underline;
            text-transform: uppercase;
        }

        p{
            font-weight: 900;
            font-size: 50px;
            text-transform: capitalize;
            text-shadow:#FC0 1px 0 10px;
            text-align:center;
            line-height: 1.6;
            letter-spacing:4px;
            word-spacing: 4px;
        }
    </style>
</head>

<body>

    <table>
        <h1>Estilo e fontes CSS</h1>
        <h2>Estilo e fontes CSS</h2>
        <h3>Estilo e fontes CSS</h3>
        <h4>Estilo e fontes CSS</h4>
    </table>

    <p>ronaldo</p>
</body>
</html>
